# nginx/conf.d/proxy.conf — Server block (static, never modified by Jenkins)
# Jenkins only modifies upstream.conf in this same directory.

server {
    listen 80;
    server_name _;

    # ── Proxy to whichever upstream is currently active ───────────────
    location / {
        proxy_pass         http://active_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Upstream connection settings
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Do NOT cache SPA responses at proxy level
        add_header Cache-Control "no-store" always;
    }

    # ── Health check passthrough (optional: expose proxy health too) ──
    location = /proxy-health {
        default_type application/json;
        return 200 '{"status":"OK","role":"proxy"}';
    }
}
