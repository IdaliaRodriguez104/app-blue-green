# nginx/nginx.conf — Reverse proxy main config
# Jenkins ONLY modifies conf.d/upstream.conf to switch traffic.
# This file is static and never touched by automation.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream="$upstream_addr"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;

    # Load upstream definition and server block from conf.d/
    include /etc/nginx/conf.d/*.conf;
}
